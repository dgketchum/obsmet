site_name: obsmet
site_description: Unified ingest, standardization, QAQC, and provenance for surface meteorological observations
site_url: https://obsmet.readthedocs.io
repo_url: https://github.com/dgketchum/obsmet
repo_name: dgketchum/obsmet

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - navigation.expand
    - navigation.instant
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - header.autohide

plugins:
  - search

markdown_extensions:
  - tables
  - fenced_code
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - pymdownx.details
  - toc:
      permalink: true

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js

nav:
  - Home: index.md
  - Overview: overview.md
  - Sources:
    - MADIS:
      - Data Source: madis/index.md
      - Workflow: madis/workflow.md
      - Quality Control: madis/qaqc.md
    - GHCNh: ghcnh.md
    - GHCN-Daily: ghcnd.md
    - ISD (deprecated): isd.md
    - GDAS: gdas.md
    - RAWS: raws.md
    - NDBC: ndbc.md
    - SNOTEL: snotel.md
  - CLI Reference: cli_reference.md
